name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Model-dependent tests skip when models/Ollama are absent; this keeps any
  # straggler from attempting a Hugging Face download on the runner.
  VOXFLOW_OFFLINE: "1"

jobs:
  swift:
    name: Swift build + test
    # Swift 6.2 toolchain (Xcode 26) — needs a macOS 26 image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  python:
    name: Python tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Test
        run: python -m pytest backend/tests -q
