name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Model-dependent tests skip when models/Ollama are absent; this keeps any
  # straggler from attempting a Hugging Face download on the runner.
  VOXFLOW_OFFLINE: "1"

jobs:
  swift:
    name: Swift build + test
    # Swift 6.2 toolchain (Xcode 26) — needs a macOS 26 image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache SwiftPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  python:
    name: Python tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: py
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # Dedicated venv: on the macOS arm64 image the toolcache python is a
      # shim into /Library/Frameworks, so pip and pytest diverged across
      # interpreters even with an explicit python-path (runs 1 and 2 both
      # died with "No module named pytest"). Venv binaries are
      # self-referential — install and test cannot disagree.
      - name: Install dependencies
        run: |
          ${{ steps.py.outputs.python-path }} -m venv .ci-venv
          ./.ci-venv/bin/python -m pip install -r backend/requirements-dev.txt

      - name: Test
        run: ./.ci-venv/bin/python -m pytest backend/tests -q
